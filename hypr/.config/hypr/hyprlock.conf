# Everforest terminal lock screen with an editorial split-screen composition.

$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = easeOut, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 3, easeOut
    animation = fadeOut, 1, 2, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

background {
    monitor =
    path = ~/dotfiles/assets/wallpapers/wallpaper.png
    blur_passes = 3
    blur_size = 5
    contrast = 0.95
    brightness = 0.66
    vibrancy = 0.10
    vibrancy_darkness = 0.12
    zindex = -10
}

# A full-height terminal pane replaces the previous floating dashboard.
shape {
    monitor =
    size = 860, 1080
    color = rgba(28, 33, 35, 0.92)
    rounding = 0
    position = -530, 0
    halign = center
    valign = center
    zindex = 0
}

shape {
    monitor =
    size = 2, 1080
    color = rgba(137, 180, 130, 0.84)
    rounding = 0
    position = -99, 0
    halign = center
    valign = center
    zindex = 1
}

shape {
    monitor =
    size = 112, 4
    color = rgba(216, 166, 87, 1.0)
    rounding = 0
    position = -794, 498
    halign = center
    valign = center
    zindex = 2
}

# Terminal pane header.
image {
    monitor =
    path = ~/.config/hypr/assets/archlinux.png
    size = 34
    rounding = 0
    border_size = 0
    position = 82, 447
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = ARCH / SECURE SHELL
    color = rgba(211, 198, 170, 0.82)
    font_size = 11
    font_family = $font
    position = 132, 447
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = <span foreground="##89b482">[+]</span>  SESSION ACTIVE
    color = rgba(211, 198, 170, 0.46)
    font_size = 9
    font_family = $font
    position = 645, 447
    halign = left
    valign = center
    zindex = 10
}

# Primary information.
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(211, 198, 170, 1.0)
    font_size = 112
    font_family = $font
    position = 76, 270
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = cmd[update:60000] date +"%A  /  %d.%m.%Y"
    color = rgba(216, 166, 87, 1.0)
    font_size = 14
    font_family = $font
    position = 86, 174
    halign = left
    valign = center
    zindex = 10
}

shape {
    monitor =
    size = 640, 1
    color = rgba(211, 198, 170, 0.20)
    rounding = 0
    position = -530, 125
    halign = center
    valign = center
    zindex = 2
}

# Authentication is treated as a terminal command, not a separate card.
label {
    monitor =
    text = <span foreground="##89b482">$USER@arch</span>:<span foreground="##d8a657">~</span>$ unlock-session
    color = rgba(211, 198, 170, 0.72)
    font_size = 12
    font_family = $font
    position = 86, 72
    halign = left
    valign = center
    zindex = 10
}

input-field {
    monitor =
    size = 640, 56
    outline_thickness = 1
    rounding = 0
    dots_size = 0.15
    dots_spacing = 0.36
    dots_center = false
    outer_color = rgba(137, 180, 130, 0.82)
    inner_color = rgba(39, 46, 48, 0.96)
    font_color = rgba(211, 198, 170, 1.0)
    check_color = rgba(216, 166, 87, 1.0)
    fail_color = rgba(230, 126, 128, 1.0)
    fade_on_empty = false
    hide_input = false
    font_family = $font
    placeholder_text = <span foreground="##859289">password required</span>
    fail_text = <span foreground="##e67e80">access denied  /  retry</span>
    check_text = <span foreground="##d8a657">authenticating...</span>
    position = -530, 10
    halign = center
    valign = center
    zindex = 10
}

label {
    monitor =
    text = ENTER TO CONFIRM  /  ESC TO CLEAR
    color = rgba(211, 198, 170, 0.38)
    font_size = 9
    font_family = $font
    position = 86, -42
    halign = left
    valign = center
    zindex = 10
}

# Quiet machine metadata anchors the pane.
label {
    monitor =
    text = cmd[update:3600000] echo "$USER@$(hostname)"
    color = rgba(137, 180, 130, 0.86)
    font_size = 11
    font_family = $font
    position = 86, -405
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = HYPRLAND  /  WAYLAND  /  TTY 01
    color = rgba(211, 198, 170, 0.40)
    font_size = 9
    font_family = $font
    position = 86, -430
    halign = left
    valign = center
    zindex = 10
}

# The wallpaper side uses oversized type instead of more panels.
label {
    monitor =
    text = 01 / WORKSTATION
    color = rgba(216, 166, 87, 0.92)
    font_size = 11
    font_family = $font
    position = -105, 447
    halign = right
    valign = center
    zindex = 10
}

label {
    monitor =
    text = LOCKED
    color = rgba(211, 198, 170, 0.94)
    font_size = 82
    font_family = $font
    position = 430, 155
    halign = center
    valign = center
    zindex = 10
}

label {
    monitor =
    text = SESSION SUSPENDED  /  AUTHENTICATION REQUIRED
    color = rgba(137, 180, 130, 0.88)
    font_size = 11
    font_family = $font
    position = 430, 83
    halign = center
    valign = center
    zindex = 10
}

shape {
    monitor =
    size = 760, 1
    color = rgba(211, 198, 170, 0.30)
    rounding = 0
    position = 430, -315
    halign = center
    valign = center
    zindex = 1
}

# Open music footer on the wallpaper side.
image {
    monitor =
    path = ~/.config/hypr/assets/spotify.png
    size = 42
    rounding = 0
    border_size = 0
    position = 1030, -386
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = NOW PLAYING  /  SPOTIFY
    color = rgba(167, 192, 128, 1.0)
    font_size = 9
    font_family = $font
    position = 1092, -366
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = cmd[update:3000] ~/.config/hypr/scripts/songdetail.sh title
    color = rgba(211, 198, 170, 0.94)
    font_size = 13
    font_family = $font
    position = 1092, -393
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = cmd[update:3000] ~/.config/hypr/scripts/songdetail.sh artist
    color = rgba(211, 198, 170, 0.52)
    font_size = 10
    font_family = $font
    position = 1092, -418
    halign = left
    valign = center
    zindex = 10
}

label {
    monitor =
    text = [ ENTER ]  RESUME
    color = rgba(211, 198, 170, 0.46)
    font_size = 9
    font_family = $font
    position = -105, -393
    halign = right
    valign = center
    zindex = 10
}
