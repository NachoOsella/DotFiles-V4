# Columns you want to display (similar to exa --long with extras)
blocks:
  - user             # owner
  - size             # human-readable size
  - date             # modification date
  - name             # name + icons

# Orden: directorios primero
sorting:
  column: name
  reverse: false
  directories_first: true
  group_directories: true

# Fecha: mostrar modificado y creado
date: "+%Y-%m-%d %H:%M"

# Size: binary (KB, MB, GB)
size: short

# Mostrar cabecera (similar a --header en exa)
header: true

# Icons and classification
icons:
  when: always
  theme: fancy
  separator: " "

# Colores (siempre activados)
color:
  when: always
  theme: custom

